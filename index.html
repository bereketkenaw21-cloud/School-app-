<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mertule Mariam School App Pro</title>
    
    <link rel="manifest" href="manifest.json">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MertuleApp">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="splash" class="splash-screen">
        <div class="glass-frame">
            <div class="logo-circle">M</div>
            <h1 class="glow-text">እንኳን ወደ መርጡለ ማሪያም School App በደህና መጣችሁ!</h1>
            <p class="sub-text">የወደፊት የትምህርት ጉዞዎን እዚህ ይጀምሩ</p>
            <div class="divider"></div>
            <p class="author-tag">በ በረከት ቀናው የተዘጋጀ</p>
            <div class="loader-dots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <div id="login-section" class="login-overlay hidden">
        <div class="login-card">
            <h2 style="color: var(--tg-blue);">Login</h2>
            <select id="role" onchange="checkRole()">
                <option value="student">ተማሪ (Student)</option>
                <option value="teacher">መምህር (Teacher)</option>
                <option value="admin">ርሰ መምህር (Admin)</option>
            </select>
            <div id="pin-area"></div>
            <input type="tel" id="phone" placeholder="ስልክ ቁጥር (09...)" maxlength="10">
            <button class="submit-btn" onclick="handleLogin()">ግባ (Login)</button>
        </div>
    </div>

    <div id="app-container" class="hidden">
        <header class="tg-header">
            <div class="header-top">
                <button id="back-btn" class="hidden" onclick="goBack()" style="background:none; border:none; color:white; font-size:1.2rem;">⬅</button>
                <div class="brand-info">
                    <span class="app-title">Mertule School Pro</span>
                    <span class="status-online">online</span>
                </div>
                <button onclick="logout()" style="background:#fff; color:#333; border:none; padding:5px 10px; border-radius:8px; font-size:0.8rem; font-weight:bold;">Logout 🚪</button>
            </div>
        </header>

        <div id="search-section" class="search-area hidden">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ትምህርት እዚህ ይፈልጉ..." onkeyup="filterSubjects()">
                <span class="search-icon">🔍</span>
            </div>
        </div>

        <div id="announcement-bar" class="hidden"></div>

        <main id="main-content">
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
